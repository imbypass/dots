# Core Hyprland Configuration
source = core/binds.conf
source = core/decoration.conf
source = core/environment.conf
source = core/input.conf
source = core/layout.conf
source = core/monitor.conf
source = core/misc.conf
source = core/startup.conf

# Extra Hyprland Configuration
source = extras/cursor.conf
source = extras/general.conf
source = extras/plugins.conf
source = extras/rules.conf
source = extras/user.conf

# xdg
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Theme Colors
source = ~/.config/omarchy/current/theme/hyprland_colors.conf
source = ~/.config/omarchy/current/theme/hyprland_border.conf
general {
    col.active_border = $activeBorderColor
    border_size = 2
}

group {
    col.border_active = $activeBorderColor
}

decoration {
    dim_inactive = false

    blur {
        enabled = no
    }
    shadow {
        enabled = no
    }
}




# Theme Hook
# source = ~/.config/omarchy/current/theme/hyprland.conf

# MacOS Input Sens
source = input.conf

# Vicinae Binds
source = vicinae.conf
